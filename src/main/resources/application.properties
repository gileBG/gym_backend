spring.application.name=gym

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3307/gym_db_fresh?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.ignore-migration-patterns=*:missing
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.root=data/uploads

# JWT
jwt.secret=tajni-kljuc-koji-treba-da-bude-dugacak-najmanje-256-bita-za-hs256
jwt.expiration=86400000

# Telegram notifications
# Set TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID env vars in production
telegram.enabled=false
telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.chat-id=${TELEGRAM_CHAT_ID:}
