spring.application.name=gym

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3307/gym_db_fresh?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=tajni-kljuc-koji-treba-da-bude-dugacak-najmanje-256-bita-za-hs256
jwt.expiration=86400000
